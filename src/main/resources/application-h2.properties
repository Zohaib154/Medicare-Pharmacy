# ===========================
# MediCare Portable H2 Fallback Configuration
# ===========================
spring.application.name=MediCare-Pharmacy-System-H2

# Server
server.port=8080
server.servlet.context-path=/api

# Reduce Tomcat thread overhead — single-user desktop app
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=4
server.tomcat.accept-count=10
server.tomcat.connection-timeout=5000

# H2 File-based Database persistence in user's home folder (portable)
spring.datasource.url=jdbc:h2:file:~/.medicare/medicare_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# HikariCP — tight pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.pool-name=MediCare-H2-Pool

# Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.cache.use_second_level_cache=false

# Enable H2 console for inspection
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Security
app.jwt.secret=medicare-super-secret-key-change-in-production-must-be-256-bits-long
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# Logging — suppress startup noise
logging.level.com.medicare=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.deprecation=ERROR
logging.level.org.springframework.boot.autoconfigure=WARN
logging.level.com.zaxxer.hikari=WARN

# Disable unnecessary features
spring.jmx.enabled=false
spring.main.banner-mode=off
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
