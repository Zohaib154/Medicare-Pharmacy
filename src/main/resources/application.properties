# ===========================
# MediCare Application Config
# ===========================
spring.application.name=MediCare-Pharmacy-System

# Server
server.port=8080
server.servlet.context-path=/api

# Reduce Tomcat thread overhead — this is a single-user desktop app
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=4
server.tomcat.accept-count=10
server.tomcat.connection-timeout=5000

# ===========================
# Database Configuration
# ===========================
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/medicare_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=0000
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP — tight pool for single-user desktop use
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.initialization-fail-timeout=10000
spring.datasource.hikari.pool-name=MediCare-Pool

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Skip format_sql overhead — not needed when show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Batch inserts for faster writes
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# Disable second-level cache warnings
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# ===========================
# JWT Security
# ===========================
app.jwt.secret=medicare-super-secret-key-change-in-production-must-be-256-bits-long
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ===========================
# Logging — suppress noisy startup logs
# ===========================
logging.level.com.medicare=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.deprecation=ERROR
logging.level.org.springframework.boot.autoconfigure=WARN
logging.level.org.springframework.web=WARN
logging.level.com.zaxxer.hikari=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===========================
# Swagger / OpenAPI — defer initialization to first request
# ===========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.api-docs.enabled=true
springdoc.cache.disabled=false

# ===========================
# Actuator — only health endpoint, minimal overhead
# ===========================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ===========================
# Spring — disable unnecessary auto-configurations
# ===========================
spring.jmx.enabled=false
spring.main.banner-mode=off
