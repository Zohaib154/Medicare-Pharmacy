# ===========================
# SQL Server Profile
# Activate with: -Dspring.profiles.active=sqlserver
# ===========================

# SQL Server connection — uses existing PharmacyDB database
# trustServerCertificate=true  bypasses self-signed cert (same as -C in sqlcmd)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=PharmacyDB;trustServerCertificate=true;encrypt=true
spring.datasource.username=sa
spring.datasource.password=YOUR_SA_PASSWORD_HERE
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# JPA / Hibernate — SQL Server dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.open-in-view=false

# Server port unchanged
server.port=8080
server.servlet.context-path=/api
